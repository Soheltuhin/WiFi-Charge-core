<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi-Charge | No Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --sky: #87CEEB;
            --hill: #228B22;
            --gold: #D4AF37;
            --sos: #FF0000;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', 'Hind Siliguri', sans-serif; }

        /* ১. ওয়েলকাম স্ক্রিন স্টাইল */
        #welcome-screen {
            position: fixed; width: 100%; height: 100%; background: var(--sky);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
            transition: transform 0.5s ease-in-out;
        }
        .hills {
            position: absolute; bottom: 0; width: 100%; height: 40%; background: var(--hill);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0; transform: scaleX(1.5);
        }
        .welcome-content { z-index: 101; text-align: center; color: white; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .welcome-btn {
            background: white; color: var(--hill); border: none; padding: 15px 45px;
            font-size: 1.2rem; font-weight: bold; border-radius: 30px; cursor: pointer; margin-top: 20px;
        }

        /* ২. ড্যাশবোর্ড স্ক্রিন (ডিফল্টভাবে হাইড করা) */
        #dashboard-screen {
            display: none; height: 100vh; flex-direction: column; background: white;
        }
        header { padding: 20px; text-align: center; border-bottom: 1px solid #eee; }
        #clock { font-size: 2.5rem; font-weight: 800; color: black; }
        .container { flex: 1; padding: 20px; text-align: center; overflow-y: auto; }
        .gold-finger { font-size: 50px; color: var(--gold); margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .card { border: 1px solid #eee; padding: 15px; border-radius: 12px; background: #fafafa; }
        .sos-btn {
            background: var(--sos); color: white; border: none; width: 110px; height: 110px;
            border-radius: 50%; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(255,0,0,0.3);
        }
        nav { display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="hills"></div>
        <div class="welcome-content">
            <h1 style="font-size: 3.5rem; margin:0;">স্বাগতম</h1>
            <p style="font-size: 1.5rem;">Welcome to WiFi-Charge</p>
            <button class="welcome-btn" onclick="showDashboard()">Welcome</button>
        </div>
    </div>

    <div id="dashboard-screen">
        <header>
            <div id="clock">00:00:00 AM</div>
        </header>

        <div class="container">
            <div class="admin-section">
                <i class="fa-solid fa-fingerprint gold-finger"></i>
                <p><strong>গ্রুপ এডমিন</strong></p>
            </div>

            <div class="grid">
                <div class="card"><i class="fa-solid fa-wallet"></i><br>ডাটা ওয়ালেট</div>
                <div class="card"><i class="fa-solid fa-phone"></i><br>অডিও কল</div>
            </div>

            <div style="margin-top: 30px;">
                <button class="sos-btn" onclick="triggerSOS()">SOS</button>
                <p id="sosAlert" style="color: red; font-size: 13px; margin-top: 10px;"></p>
            </div>
        </div>

        <nav>
            <i class="fa-solid fa-message" style="color:black"></i>
            <i class="fa-solid fa-users"></i>
            <i class="fa-solid fa-gear"></i>
        </nav>
    </div>

    <script>
        // স্ক্রিন পরিবর্তন ফাংশন
        function showDashboard() {
            document.getElementById('welcome-screen').style.transform = 'translateY(-100%)';
            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('dashboard-screen').style.display = 'flex';
            }, 500);
        }

        // রিয়েল টাইম ক্লক
        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            let s = now.getSeconds();
            let ampm = h >= 12 ? 'PM': 'AM';
            h = h % 12 || 12;
            m = m < 10 ? '0' + m : m;
            s = s < 10 ? '0' + s : s;
            document.getElementById('clock').innerText = `${h}:${m}:${s} ${ampm}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // SOS লজিক
        let count = 0;
        function triggerSOS() {
            count++;
            let alertBox = document.getElementById('sosAlert');
            if(count === 1) alertBox.innerText = "⚠️ ১ম ধাপ: জরুরি মেসেজ পাঠানো হয়েছে!";
            else {
                alertBox.innerText = "🚨 ২য় ধাপ: লোকেশন ও ভয়েস শেয়ার হচ্ছে!";
                count = 0;
            }
        }
    </script>
</body>
</html>
