<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi-Charge-Core | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --sky-blue: #87CEEB;
            --hill-green: #228B22;
            --gold: #D4AF37;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background-color: var(--sky-blue);
        }

        /* 1. Landscape Background (Matches your Image) */
        .landscape-container {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .hills {
            position: absolute; bottom: 0; width: 160%; height: 45%;
            background-color: var(--hill-green);
            border-radius: 50% 50% 0 0;
            z-index: 1;
            transform: scaleX(1.2);
        }

        /* 2. Welcome Content */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .main-title {
            font-size: 4rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .sub-title {
            font-size: 1.5rem;
            margin: 10px 0 50px;
            font-weight: 400;
            opacity: 0.9;
        }

        /* 3. Golden Fingerprint Button (Matches your Image) */
        .fingerprint-wrapper {
            position: relative;
            display: inline-block;
        }

        .fingerprint-btn {
            width: 120px;
            height: 120px;
            background: white;
            border: 5px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
