<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi-Charge Core - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }
        .butterfly-logo {
            width: 100px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(147, 197, 253, 0.5));
        }
    </style>
</head>
<body class="p-4">

    <div class="fixed top-5 right-5 text-white text-sm font-medium">
        <button onclick="setLanguage('en')" id="btn-en" class="text-blue-400">EN</button> 
        <span class="mx-1">|</span> 
        <button onclick="setLanguage('bn')" id="btn-bn" class="hover:text-blue-400">বাংলা</button>
    </div>

    <div class="w-full max-w-md text-center">
        <div class="flex justify-center mb-4">
            <img src="https://i.ibb.co/1000117035.jpg" alt="Butterfly Logo" class="butterfly-logo rounded-full">
        </div>

        <h1 class="text-4xl font-bold text-white mb-2 italic">WiFi-<span class="text-blue-500">Charge</span></h1>
        <h2 class="text-3xl font-bold text-white mb-2">Core</h2>
        <p id="tagline" class="text-gray-300 mb-8">Share your internet, Earn data credits.</p>

        <div class="glass-card p-8 shadow-2xl">
            <h3 id="login-title" class="text-2xl font-semibold text-white mb-8">Login Now</h3>

            <form id="login-form" class="space-y-4">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" id="email" placeholder="example@mail.com" class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:border-blue-500 transition">
                </div>

                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="password" placeholder="Password" class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:border-blue-500 transition">
                </div>

                <button type="submit" id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transform transition active:scale-95 flex items-center justify-center">
                    Login <i class="fas fa-paper-plane ml-2"></i>
                </button>
            </form>

            <div class="my-6 flex items-center justify-between">
                <hr class="w-full border-slate-700">
                <span class="px-3 text-gray-500 text-xs uppercase">OR</span>
                <hr class="w-full border-slate-700">
            </div>

            <button class="w-full bg-white text-gray-700 font-medium py-3 rounded-xl flex items-center justify-center space-x-2 hover:bg-gray-100 transition">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google">
                <span id="btn-google">Continue with Google</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
const firebaseConfig = {
  apiKey: "AIzaSyAZXreOuLUFY6TSWsypxsp0TDyIEOaGWcI",
  authDomain: "wifi-core.firebaseapp.com",
  projectId: "wifi-core",
  storageBucket: "wifi-core.firebasestorage.app",
  messagingSenderId: "631400272371",
  appId: "1:631400272371:web:81443d140b50af68ad4286",
  measurementId: "G-L9L950G3MT"
};
        

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Login Logic
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("Login Successful!");
                })
                .catch((error) => {
                    alert(error.message);
                });
        });
    </script>

    <script>
        const translations = {
            en: {
                tagline: "Share your internet, Earn data credits.",
                loginTitle: "Login Now",
                btnLogin: "Login",
                btnGoogle: "Continue with Google"
            },
            bn: {
                tagline: "আপনার ইন্টারনেট শেয়ার করুন, ডেটা ক্রেডিট আয় করুন।",
                loginTitle: "এখনই লগইন করুন",
                btnLogin: "লগইন করুন",
                btnGoogle: "গুগল দিয়ে চালিয়ে যান"
            }
        };

        function setLanguage(lang) {
            document.getElementById('tagline').innerText = translations[lang].tagline;
            document.getElementById('login-title').innerText = translations[lang].loginTitle;
            document.getElementById('btn-login').innerHTML = `${translations[lang].btnLogin} <i class="fas fa-paper-plane ml-2"></i>`;
            document.getElementById('btn-google').innerText = translations[lang].btnGoogle;
            
            document.getElementById('btn-en').className = lang === 'en' ? 'text-blue-400' : 'hover:text-blue-400';
            document.getElementById('btn-bn').className = lang === 'bn' ? 'text-blue-400' : 'hover:text-blue-400';
        }
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // আপনার Firebase Config (এগুলো পরিবর্তন করবেন না যদি আগে থেকেই বসানো থাকে)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginForm = document.getElementById('login-form');
    const loadingOverlay = document.getElementById('loading-overlay');

    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        // ১. লোডিং স্ক্রিন দেখাবে
        loadingOverlay.classList.remove('hidden');
        loadingOverlay.classList.add('flex');

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // ২. Firebase এ লগইন রিকোয়েস্ট পাঠানো
        signInWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                // ৩. লগইন সফল হলে সরাসরি dashboard.html এ নিয়ে যাবে
                window.location.href = "dashboard.html"; 
            })
            .catch((error) => {
                // ৪. ভুল হলে লোডিং বন্ধ হবে এবং এরর দেখাবে
                loadingOverlay.classList.add('hidden');
                loadingOverlay.classList.remove('flex');
                alert("Login Failed: " + error.message);
            });
    });
</script>
