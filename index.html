
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi-Charge Core | Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100%; }
        
        /* আপনার পছন্দমতো গভীর নীল ব্যাকগ্রাউন্ড */
        .bg-container {
            background: linear-gradient(135deg, #0d47a1 0%, #1976d2 100%);
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-box {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        
        h2 { color: #0d47a1; margin-bottom: 10px; font-size: 22px; }
        p { color: #555; margin-bottom: 25px; }
        
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #0d47a1;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .hidden { display: none; }
        #recaptcha-container { margin: 10px 0; }
    </style>
</head>
<body>

<div class="bg-container">
    <div class="login-box">
        <h2>লগইন করুন</h2>
        <p id="instruction">আপনার মোবাইল নম্বরটি দিন</p>
        
        <div id="phone-section">
            <input type="tel" id="phoneNumber" placeholder="+8801700000000">
            <div id="recaptcha-container"></div>
            <button onclick="sendOTP()">ওটিপি পাঠান</button>
        </div>

        <div id="otp-section" class="hidden">
            <input type="text" id="verificationCode" placeholder="কোডটি লিখুন">
            <button onclick="verifyOTP()">ভেরিফাই করুন</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAZXreOuLUFY6TSWsypxsp0TDyIEOaGWcI",
        authDomain: "wifi-core.firebaseapp.com",
        projectId: "wifi-core",
        storageBucket: "wifi-core.firebasestorage.app",
        messagingSenderId: "631400272371",
        appId: "1:631400272371:web:81443d140b50af68ad4286"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });

    function sendOTP() {
        const number = document.getElementById('phoneNumber').value;
        auth.signInWithPhoneNumber(number, window.recaptchaVerifier)
            .then((confirmationResult) => {
                window.confirmationResult = confirmationResult;
                document.getElementById('phone-section').classList.add('hidden');
                document.getElementById('otp-section').classList.remove('hidden');
                document.getElementById('instruction').innerText = "আপনার মোবাইলের কোডটি দিন";
                alert("ওটিপি পাঠানো হয়েছে!");
            }).catch((err) => alert("ভুল হয়েছে: " + err.message));
    }

    function verifyOTP() {
        const code = document.getElementById('verificationCode').value;
        confirmationResult.confirm(code).then(() => {
            alert("সফলভাবে লগইন হয়েছে!");
            window.location.href = "https://google.com";
        }).catch(() => alert("ভুল কোড!"));
    }
</script>
</body>
</html>
