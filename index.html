<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Super App</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        .logo {
            width: 150px;
            /* আপনার গ্লোব ইমেজের নাম এখানে দিন */
            box-shadow: 0 0 50px rgba(173, 216, 230, 0.3);
            border-radius: 50%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .loader {
            margin-top: 20px;
            color: #b0e0e6;
            font-family: Arial, sans-serif;
            letter-spacing: 3px;
            font-size: 14px;
        }
    </style>
    
    <script>
        setTimeout(function() {
            window.location.href = "dashboard.html";
        }, 3000); 
    </script>
</head>
<body>

    <div class="splash-container">
        <img src="your-globe-image.png" alt="Super App" class="logo">
        <div class="loader">প্রবেশ করা হচ্ছে...</div>
    </div>

</body>
</html>
