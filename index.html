<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super App Loading</title>
    <style>
        /* পুরো স্ক্রিন জুড়েই একটি ব্যাকগ্রাউন্ড থাকবে */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* আপনার পছন্দের সাদা-নীল ব্যাকগ্রাউন্ড */
            background: linear-gradient(135deg, #e0f7fa 0%, #ffffff 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }

        /* লোডিং কন্টেইনার */
        .loading-container {
            text-align: center;
        }

        /* ৩টি বিন্দু (dots) অ্যানিমেশন */
        .dots {
            display: inline-block;
            position: relative;
            width: 80px;
            height: 80px;
        }

        .dots div {
            position: absolute;
            top: 33px;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            /* প্রধান লোডিং কালার: হালকা নীল */
            background: #03a9f4;
            animation-timing-function: cubic-bezier(0, 1, 1, 0);
        }

        .dots div:nth-child(1) {
            left: 8px;
            animation: dots1 0.6s infinite;
        }

        .dots div:nth-child(2) {
            left: 8px;
            animation: dots2 0.6s infinite;
        }

        .dots div:nth-child(3) {
            left: 32px;
            animation: dots2 0.6s infinite;
        }

        .dots div:nth-child(4) {
            left: 56px;
            animation: dots3 0.6s infinite;
        }

        /* বিন্দুগুলোর জন্য অ্যানিমেশন কিফ্রেম */
        @keyframes dots1 {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        @keyframes dots2 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(24px, 0); }
        }

        @keyframes dots3 {
            0% { transform: scale(1); }
            100% { transform: scale(0); }
