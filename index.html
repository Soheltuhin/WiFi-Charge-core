<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi-Charge-core Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #001f3f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #333; padding: 30px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .lang-switch { text-align: right; font-size: 14px; margin-bottom: 20px; color: #bbb; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 98%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .google-btn { background-color: white; color: black; margin-top: 15px; }
        .footer-link { margin-top: 15px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="lang-switch">English | বাংলা</div>
    
    <h2 id="title">লগইন করুন</h2>

    <input type="tel" id="phone" placeholder="+8801XXXXXXXXX" required>
    
    <input type="email" id="email" placeholder="আপনার ইমেইল">
    
    <input type="password" id="password" placeholder="পাসওয়ার্ড">

    <button onclick="handleLogin()">লগইন</button>

    <button class="google-btn" onclick="googleLogin()">Login with Google</button>

    <div class="footer-link">
        <p>কল সুবিধা এবং ওটিপি সাপোর্ট চালু আছে</p>
    </div>
</div>

<script>
    function handleLogin() {
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        
        if(phone) {
            alert("মোবাইল নম্বরে ওটিপি পাঠানো হচ্ছে...");
            // এখানে আপনার ওটিপি লজিক বসবে
        } else if(email) {
            alert("ইমেইল দিয়ে লগইন করা হচ্ছে...");
        }
    }

    function googleLogin() {
        alert("গুগল লগইন উইন্ডো ওপেন হচ্ছে...");
    }
</script>

</body>
</html>
