<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্বাগতম | Welcome - WiFi Charge</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sky-blue: #87CEEB;
            --hill-green: #228B22;
            --text-dark: #333333;
            --gold: #D4AF37;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', 'Hind Siliguri', sans-serif;
            overflow: hidden; /* স্ক্রলিং বন্ধ রাখার জন্য */
        }

        /* ব্যাকগ্রাউন্ড ল্যান্ডস্কেপ */
        .landscape-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--sky-blue);
            z-index: -1;
        }

        /* সবুজ পাহাড় */
        .hills {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background-color: var(--hill-green);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0; /* পাহাড়ের আকৃতি */
            transform: scaleX(1.3);
        }

        /* কন্টেন্ট বক্স */
        .welcome-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 80%; /* পাহাড়ের উপরে টেক্সট রাখার জন্য */
            text-align: center;
            color: white; /* ব্যাকগ্রাউন্ডের উপর সাদার দৃশ্যমানতা ভালো */
            text-shadow: 0px 2px 4px rgba(0,0,0,0.3);
            padding: 20px;
        }

        .welcome-title {
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .welcome-subtitle {
            font-size: 1.5rem;
            margin-bottom: 30px;
            font-weight: 400;
        }

        /* ওয়েলকাম বাটন */
        .welcome-btn {
            background-color: white;
            color: var(--hill-green);
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .welcome-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0px 6px 15px rgba(0,0,0,0.3);
        }

        .welcome-btn:active {
            transform: translateY(1px);
        }

    </style>
</head>
<body>

    <div class="landscape-container">
        <div class="hills"></div>
    </div>

    <div class="welcome-content">
        <h1 class="welcome-title">স্বাগতম</h1>
        <h2 class="welcome-subtitle">Welcome to WiFi-Charge</h2>

        <button class="welcome-btn" onclick="enterApp()">Welcome</button>
    </div>

    <script>
        function enterApp() {
            // এই ফাংশনটি আপনাকে মূল ড্যাশবোর্ডে নিয়ে যাবে।
            // যেহেতু আপনি লগইন বাতিল করেছেন, আমরা সরাসরি ড্যাশবোর্ড কোডটি লোড করব।
            // আপাতত একটি অ্যালার্ট দিচ্ছি, পরে এটি ড্যাশবোর্ড লোড করবে।
            alert("ড্যাশবোর্ডে প্রবেশ করা হচ্ছে...");
            
            // আপনি যদি আগের dashboard.html ফাইলটি একই ফোল্ডারে রাখেন,
            // তবে নিচের লাইনটি আনকমেন্ট করুন:
            // window.location.href = "dashboard.html"; 
        }
    </script>
</body>
</html>
