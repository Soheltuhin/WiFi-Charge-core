<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WiFi-Charge Core | Premium Login</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, #0B1120 0%, #19233C 50%, #0F172A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #3B82F6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(105deg, #2563EB 0%, #1D4ED8 100%);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">

    <div class="w-full max-w-md">
        <div class="glass-card p-8 md:p-10">
            
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600/20 border border-blue-500/30 mb-4">
                    <i class="fas fa-wifi text-3xl text-blue-400"></i>
                </div>
                <h1 class="text-3xl font-bold text-white tracking-tight">WiFi-Charge <span class="text-blue-500">Core</span></h1>
                <p class="text-gray-400 text-sm mt-2">Share your bandwidth, earn data credits</p>
            </div>
            
            <div id="errorAlert" class="hidden mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex items-center gap-3">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorMsg">Invalid credentials</span>
            </div>
            
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-gray-300 text-xs font-semibold uppercase tracking-wider mb-2 ml-1">Email Address</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                        <input type="email" id="email" required 
                            class="glass-input w-full pl-11 pr-4 py-3.5 rounded-xl text-white placeholder-gray-500 text-sm"
                            placeholder="name@company.com">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-300 text-xs font-semibold uppercase tracking-wider mb-2 ml-1">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                        <input type="password" id="password" required 
                            class="glass-input w-full pl-11 pr-4 py-3.5 rounded-xl text-white placeholder-gray-500 text-sm"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex justify-end">
                    <a href="#" class="text-blue-400 text-xs hover:underline">Forgot Password?</a>
                </div>

                <button type="submit" id="submitBtn" class="btn-primary w-full py-4 rounded-xl text-white font-bold flex items-center justify-center gap-2 transition-all active:scale-[0.98]">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right text-xs"></i>
                </button>
            </form>
            
            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#11192b] px-4 text-gray-500 tracking-widest">Or continue with</span></div>
            </div>
            
            <button id="googleBtn" class="w-full py-3.5 rounded-xl bg-white/5 border border-white/10 text-white font-medium flex items-center justify-center gap-3 hover:bg-white/10 transition-all">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5" alt="Google">
                <span>Google Account</span>
            </button>
            
            <p class="text-center text-gray-500 text-sm mt-8">
                New to the platform? <a href="#" class="text-blue-400 hover:text-blue-300 font-semibold transition">Create Account</a>
            </p>
        </div>

        <div class="mt-8 flex justify-center items-center gap-6 text-[10px] text-gray-600 uppercase tracking-[0.2em]">
            <span class="flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> System Active</span>
            <span class="flex items-center gap-1.5"><i class="fas fa-shield-alt"></i> SSL Encrypted</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // IMPORTANT: Replace with your actual Firebase Config
        const firebaseConfig = {
  apiKey: "AIzaSyAZXreOuLUFY6TSWsypxsp0TDyIEOaGWcI",
  authDomain: "wifi-core.firebaseapp.com",
  projectId: "wifi-core",
  storageBucket: "wifi-core.firebasestorage.app",
  messagingSenderId: "631400272371",
  appId: "1:631400272371:web:81443d140b50af68ad4286",
  measurementId: "G-L9L950G3MT"
};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorAlert = document.getElementById('errorAlert');

        // Handle Email Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<div class="spinner"></div>`;
            errorAlert.classList.add('hidden');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "dashboard.html";
            } catch (error) {
                document.getElementById('errorMsg').innerText = error.message;
                errorAlert.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>Sign In</span><i class="fas fa-arrow-right text-xs"></i>`;
            }
        });

        // Handle Google Login
        document.getElementById('googleBtn').addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "dashboard.html";
            } catch (error) {
                alert(error.message);
            }
        });

        // Auto Redirect if logged in
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = "dashboard.html";
        });
    </script>
</body>
</html>
