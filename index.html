<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্বাগতম | WiFi-Charge - Butterfly Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --sky-blue: #87CEEB;
            --hill-green: #228B22;
            --gold: #D4AF37;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Inter', 'Hind Siliguri', sans-serif;
            overflow: hidden;
            background-color: var(--sky-blue);
        }

        /* ১. ব্যাকগ্রাউন্ড ল্যান্ডস্কেপ (আকাশ ও পাহাড়) */
        .landscape-container {
            position: absolute; width: 100%; height: 100%;
            z-index: 1;
        }
        .hills {
            position: absolute; bottom: 0; width: 100%; height: 40%;
            background-color: var(--hill-green);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            transform: scaleX(1.3);
        }

        /* ২. স্বাগত কন্টেন্ট (টেক্সট) */
        .welcome-content {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 70%; text-align: center;
            color: white; text-shadow: 0px 2px 4px rgba(0,0,0,0.3);
            padding: 20px;
        }
        .welcome-title { font-size: 3rem; margin: 0; font-weight: 700; }
        .welcome-subtitle { font-size: 1.4rem; margin: 10px 0 30px; font-weight: 400; }

        /* ৩. ফিঙ্গারপ্রিন্ট লক বাটন (গোল্ডেন) */
        .fingerprint-container {
            position: relative;
            width: 100px; height: 100px;
            margin-top: 20px;
        }
        .fingerprint-btn {
            width: 100%; height: 100%;
            border: 4px solid var(--gold);
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.9);
            color: var(--gold);
            font-size: 50px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            box-shadow: 0px 4px 15px rgba(212, 175, 55, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative; z-index: 15;
            overflow: hidden; /* স্ক্যানিং এনিমেশনের জন্য */
        }
        .fingerprint-btn:active { transform: scale(0.95); }

        /* ফিঙ্গারপ্রিন্ট স্ক্যানিং এনিমেশন লাইন */
        .scan-line {
            position: absolute;
            width: 100%; height: 4px;
            background-color: rgba(212, 175, 55, 0.8);
            box-shadow: 0 0 10px var(--gold);
            top: -100%; /* শুরুতে উপরে থাকবে */
            z-index: 16;
            display: none; /* ডিফল্টভাবে হাইড */
        }

        @keyframes scan {
            0% { top: 0%; opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
