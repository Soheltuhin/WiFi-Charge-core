<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi-Charge Core</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
    background: radial-gradient(circle at top, #1e3a8a, #0b0f1a);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: 'Inter', sans-serif;
}
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 25px;
    border: 1px solid rgba(255,255,255,0.1);
}
.input {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
}
</style>
</head>

<body>

<div class="w-full max-w-md p-5">

<!-- Language -->
<div class="flex justify-end mb-6 text-sm gap-2">
<button onclick="setLang('en')" id="enBtn" class="text-blue-400 font-bold">EN</button>
<span>|</span>
<button onclick="setLang('bn')" id="bnBtn" class="text-gray-400">বাংলা</button>
</div>

<!-- Title -->
<div class="text-center mb-10">
<h1 class="text-4xl font-black italic">
WiFi-<span class="text-blue-500">Charge</span><br>Core
</h1>
<p id="subtitle" class="text-gray-400 mt-3 text-sm">
Share your internet, Earn data credits.
</p>
</div>

<!-- Card -->
<div class="glass p-7 shadow-2xl">

<h2 id="loginTitle" class="text-2xl font-bold text-center mb-6">
Login Now
</h2>

<form id="loginForm" class="space-y-5">

<!-- Email -->
<div class="relative">
<i class="fas fa-envelope absolute left-4 top-4 text-gray-500"></i>
<input id="email" type="email" placeholder="example@mail.com"
class="w-full py-3 pl-12 pr-4 rounded-xl input outline-none">
</div>

<!-- Password -->
<div class="relative">
<i class="fas fa-lock absolute left-4 top-4 text-gray-500"></i>
<input id="password" type="password" placeholder="Password"
class="w-full py-3 pl-12 pr-4 rounded-xl input outline-none">
</div>

<!-- Button -->
<button id="loginBtn" class="w-full bg-blue-600 py-3 rounded-xl font-bold hover:bg-blue-500 transition">
<span id="btnText">Login</span>
</button>

</form>

<div class="text-center my-6 text-gray-500 text-xs" id="orText">OR</div>

<button class="w-full bg-white text-black py-3 rounded-xl font-bold flex justify-center gap-2">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5">
<span id="googleText">Continue with Google</span>
</button>

</div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Login
document.getElementById('loginForm').addEventListener('submit', (e)=>{
    e.preventDefault();

    const email = email.value;
    const password = password.value;

    signInWithEmailAndPassword(auth, email, password)
    .then(()=>{
        alert("Login Success");
    })
    .catch(err=>{
        alert(err.message);
    });
});

// Language system
const data = {
en:{
subtitle:"Share your internet, Earn data credits.",
login:"Login Now",
btn:"Login",
or:"OR",
google:"Continue with Google",
pass:"Password"
},
bn:{
subtitle:"আপনার ইন্টারনেট শেয়ার করুন, ডাটা আয় করুন",
login:"লগইন করুন",
btn:"লগইন",
or:"অথবা",
google:"Google দিয়ে চালান",
pass:"পাসওয়ার্ড"
}
};

window.setLang = (lang)=>{
document.getElementById("subtitle").innerText = data[lang].subtitle;
document.getElementById("loginTitle").innerText = data[lang].login;
document.getElementById("btnText").innerText = data[lang].btn;
document.getElementById("orText").innerText = data[lang].or;
document.getElementById("googleText").innerText = data[lang].google;
document.getElementById("password").placeholder = data[lang].pass;

document.getElementById("enBtn").className =
lang==="en" ? "text-blue-400 font-bold" : "text-gray-400";

document.getElementById("bnBtn").className =
lang==="bn" ? "text-blue-400 font-bold" : "text-gray-400";
}
</script>

</body>
</html>
