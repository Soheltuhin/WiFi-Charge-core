<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohel Dashboard - Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --bg-dark: #0b1c11;
            --yt-red: #ff0000;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at top right, #384f42, transparent 50%),
                radial-gradient(circle at bottom left, #23432f, transparent 40%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* হেডার */
        .header-top {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: rgba(0, 0, 0, 0.4);
        }

        .header-top img { height: 22px; }

        .number-circle {
            width: 30px; height: 30px;
            border-radius: 50%; border: 2px solid white;
            color: var(--neon-blue);
            display: flex; justify-content: center; align-items: center;
            font-weight: bold;
        }

        /* লগইন সেকশন */
        #login-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .login-btn {
            margin-top: 25px;
            padding: 15px 45px;
            background: white;
            color: #222;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(255,255,255,0.1);
        }

        /* ড্যাশবোর্ড কন্টেইনার */
        #dashboard {
            display: none;
            flex: 1;
            flex-direction: column;
        }

        /* লোডিং বক্স */
        .loading-box {
            background: white;
            margin: auto;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 80%;
            max-width: 350px;
            color: #333;
        }

        /* প্রোফাইল কার্ড */
        .profile-card {
            padding: 15px 20px;
            background: rgba(0, 43, 83, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--neon-blue);
        }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--neon-blue); }
        .user-text h2 { margin: 0; font-size: 13px; }
        .user-text p { margin: 2px 0 0; font-size: 10px; color: var(--neon-blue); font-weight: bold; }

        /* বিশাল ইউটিউব বাটন */
        .yt-banner {
            width: 92%;
            margin: 15px auto;
            background: #1a0000;
            border: 4px solid var(--yt-red);
            border-radius: 20px;
            padding: 45px 0; /* কিবোর্ড সাইজ উচ্চতা */
            text-align: center;
            text-decoration: none;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            transition: 0.3s;
        }

        .yt-banner i { font-size: 80px; color: var(--yt-red); } /* আইকন অনেক বড় */
        .yt-label { color: var(--yt-red); font-weight: bold; font-size: 20px; margin-top: 15px; display: block; letter-spacing: 3px; }

        /* ৯টি অ্যাপ গ্রিড */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 92%;
            margin: 0 auto 15px;
            flex: 1; /* এটি স্ক্রিনের শেষ পর্যন্ত জায়গা নেবে */
        }

        .app-card {
            background: #001a33;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            transition: 0.2s;
        }

        .app-card i { font-size: 30px; margin-bottom: 10px; }
        .app-card span { font-size: 11px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header-top">
        <img src="https://www.gstatic.com/images/branding/googlelogo/2x/googlelogo_light_color_92x30dp.png" alt="Google">
        <div class="number-circle">0</div>
    </div>

    <div id="login-section">
        <h2 style="font-weight: 400;">Google Account Login</h2>
        <button class="login-btn" onclick="handleLogin()">Login with Google</button>
    </div>

    <div id="dashboard">
        <div id="loader" class="loading-box">
            <h3 style="color: #2e7d32;">Success!</h3>
            <p>WiFi Data Storage Loading...</p>
            <i class="fas fa-circle-notch fa-spin" style="font-size: 24px; color: #007aff;"></i>
        </div>

        <div id="content" style="display:none; height: 100%; flex-direction: column;">
            <div class="profile-card">
                <div class="user-info">
                    <img src="https://ui-avatars.com/api/?name=Sohel+Hossain&background=007aff&color=fff" class="avatar">
                    <div class="user-text">
                        <h2>MOHAMMAD SOHEL HOSSAIN</h2>
                        <p><i class="fas fa-check-circle"></i> PREMIUM USER</p>
                    </div>
                </div>
                <i class="fas fa-cog" style="color: #888;"></i>
            </div>

            <a href="https://www.youtube.com" target="_blank" class="yt-banner">
                <i class="fab fa-youtube"></i>
                <span class="yt-label">YOUTUBE</span>
            </a>

            <div class="app-grid">
                <a href="https://google.com" class="app-card">
                    <i class="fab fa-google" style="color: #4285F4;"></i>
                    <span>Google</span>
                </a>
                <a href="https://facebook.com" class="app-card">
                    <i class="fab fa-facebook" style="color: #1877F2;"></i>
                    <span>Facebook</span>
                </a>
                <a href="https://gemini.google.com/" class="app-card">
                    <i class="fas fa-wand-magic-sparkles" style="color: #8E75FF;"></i>
                    <span>Gemini AI</span>
                </a>
                <a href="https://www.tiktok.com" class="app-card">
                    <i class="fab fa-tiktok"></i>
                    <span>TikTok</span>
                </a>
                <a href="https://web.whatsapp.com" class="app-card">
                    <i class="fab fa-whatsapp" style="color: #25D366;"></i>
                    <span>WhatsApp</span>
                </a>
                <a href="https://quran.com" class="app-card">
                    <i class="fas fa-book-quran" style="color: #FFD700;"></i>
                    <span>Al-Quran</span>
                </a>
                <a href="tel:" class="app-card">
                    <i class="fas fa-phone-alt" style="color: #34C759;"></i>
                    <span>Dialer</span>
                </a>
                <a href="intent:#Intent;action=android.settings.WIFI_SETTINGS;end" class="app-card">
                    <i class="fas fa-wifi" style="color: #007AFF;"></i>
                    <span>WiFi Setup</span>
                </a>
                <a href="https://play.google.com/store/apps/details?id=com.digibites.accubattery" class="app-card">
                    <i class="fas fa-battery-three-quarters" style="color: #4CAF50;"></i>
                    <span>AccuBattery</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            window.open("https://accounts.google.com/", "_blank");
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';

            setTimeout(function() {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('content').style.display = 'flex';
            }, 3000);
        }
    </script>
</body>
</html>
