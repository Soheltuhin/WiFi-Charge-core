<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi-CORE | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at top, #001f3f, #000); min-height: 100vh; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-glow { box-shadow: 0 0 20px rgba(234, 179, 8, 0.5); border: 2px solid rgba(234, 179, 8, 0.6); }
        .status-online { color: #10b981; }
        /* Loader Style */
        #loader { background: #000; z-index: 9999; transition: opacity 0.5s ease; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div id="loader" class="fixed inset-0 flex items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
    </div>

    <div id="mainContent" class="hidden">
        <nav class="flex justify-between items-center mb-10 max-w-5xl mx-auto bg-white/5 p-4 rounded-2xl border border-white/10">
            <h1 class="text-xl font-bold tracking-widest text-blue-500 flex items-center gap-2">
                <i class="fas fa-wifi"></i> WiFi-CORE
            </h1>
            <div class="flex items-center gap-4">
                <button onclick="toggleMembers()" class="w-10 h-10 bg-gradient-to-tr from-yellow-600 to-yellow-300 rounded-full flex items-center justify-center text-black gold-glow hover:scale-110 transition active:scale-95">
                    <i class="fas fa-fingerprint text-xl"></i>
                </button>
                <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition px-2"><i class="fas fa-power-off"></i></button>
            </div>
        </nav>

        <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="glass p-8 rounded-3xl text-center space-y-4 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-2 bg-blue-600/20 text-blue-400 text-[10px] rounded-bl-xl font-bold uppercase">Family Head</div>
                <img id="userImg" src="https://ui-avatars.com/api/?name=User&background=001f3f&color=fff" class="w-24 h-24 rounded-full mx-auto border-4 border-blue-500 shadow-lg">
                <div>
                    <h2 id="userName" class="text-xl font-bold text-white">Loading...</h2>
                    <p id="userEmail" class="text-gray-400 text-sm italic font-mono">user@example.com</p>
                </div>
                <div class="flex justify-center gap-2 mt-2">
                   <span class="text-[10px] bg-green-900/40 text-green-400 px-3 py-1 rounded-full border border-green-800">Verified</span>
                </div>
            </div>

            <div class="glass p-8 rounded-3xl md:col-span-2 flex flex-col justify-center">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-gray-400 uppercase tracking-widest text-xs font-bold">Data Wallet Credits</span>
                    <i class="fas fa-coins text-yellow-500 text-2xl"></i>
                </div>
                <div class="text-5xl font-extrabold mb-6 flex items-baseline gap-2">
                    <span id="balance" class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">12.45</span> 
                    <span class="text-lg text-gray-500 font-normal">GB</span>
                </div>
                <div class="flex gap-4">
                    <button class="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-2xl font-bold transition shadow-lg shadow-blue-600/20">Withdraw</button>
                    <button class="bg-white/5 border border-white/10 hover:bg-white/10 px-8 py-3 rounded-2xl font-bold transition">Family Log</button>
                </div>
            </div>

            <div class="glass p-6 rounded-3xl md:col-span-3 flex items-center justify-between border-l-4 border-l-green-500">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-green-500/10 rounded-full flex items-center justify-center">
                        <i class="fas fa-broadcast-tower text-green-500 animate-pulse"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-sm">Network Status: <span class="text-green-400 uppercase">Home Active</span></h4>
                        <p class="text-[10px] text-gray-500 tracking-wide uppercase">Your home broadband is currently collecting credits</p>
                    </div>
                </div>
                <div class="text-right flex flex-col items-end">
                    <span class="text-xs text-gray-400">Security Check:</span>
                    <span class="text-[10px] text-blue-400 font-mono">MD5-ENCRYPTED</span>
                </div>
            </div>
        </div>

        <div id="memberPanel" class="fixed top-0 right-0 h-full w-72 bg-[#000d1a] border-l border-yellow-500/20 shadow-[-10px_0_30px_rgba(0,0,0,0.8)] z-[1000] translate-x-full transition-transform duration-300 p-6">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-yellow-500 font-bold text-xs tracking-widest uppercase">Family Members</h3>
                <button onclick="toggleMembers()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <div class="space-y-6">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full border border-yellow-500 flex items-center justify-center bg-yellow-500/10 text-yellow-500 font-bold">S</div>
                    <div>
                        <p class="text-sm font-bold">MD Sohel Hossain</p>
                        <p class="text-[9px] text-yellow-600 uppercase">Admin / Owner</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 opacity-70">
                    <div class="w-10 h-10 rounded-full border border-gray-600 flex items-center justify-center bg-white/5 text-gray-400 font-bold text-xs">Z</div>
                    <div>
                        <p class="text-sm">Zahid Alam</p>
                        <p class="text-[9px] text-green-500">Active Online</p>
                    </div>
                </div>
            </div>
            <button class="absolute bottom-10 left-6 right-6 py-3 border border-dashed border-white/20 rounded-xl text-[10px] text-gray-500 hover:border-blue-500 hover:text-blue-400 transition">
                <i class="fas fa-user-plus mr-2"></i> ADD MEMBER
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZXreOuLUFY6TSWsypxsp0TDyIE0aGWcI",
            authDomain: "wifi-core.firebaseapp.com",
            projectId: "wifi-core",
            storageBucket: "wifi-core.firebasestorage.app",
            messagingSenderId: "631400272371",
            appId: "1:631400272371:web:81443d140b50af68ad4286"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Session Protection Logic
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is valid, populate data
                document.getElementById('userName').innerText = user.displayName || "Family Head";
                document.getElementById('userEmail').innerText = user.email;
                if(user.photoURL) document.getElementById('userImg').src = user.photoURL;
                
                // Show Content, hide loader
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('mainContent').classList.remove('hidden');
                }, 500);

            } else {
                // Give Firebase 2 seconds to confirm session before redirecting
                setTimeout(() => {
                    if(!auth.currentUser) window.location.href = "index.html";
                }, 2000);
            }
        });

        // Global functions
        window.toggleMembers = () => {
            const panel = document.getElementById('memberPanel');
            panel.classList.toggle('translate-x-full');
        };

        window.logout = () => {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            });
        };
    </script>
</body>
</html>
