<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammad Sohel Hossain - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --bg-dark: #0b1c11; /* Deep forest dark background */
            --yt-red: #ff0000;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 1. Top Branding Header */
        .top-bar {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            letter-spacing: 2px;
            font-size: 14px;
            font-weight: bold;
        }

        /* 2. Profile Section */
        .profile-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: #002b53; /* Dark blue as per image */
            border-bottom: 2px solid var(--neon-blue);
        }

        .user-details {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
            background: url('https://ui-avatars.com/api/?name=Sohel+Hossain&background=007aff&color=fff');
            background-size: cover;
        }

        .user-text h2 {
            margin: 0;
            font-size: 13px;
            text-transform: uppercase;
        }

        .user-text p {
            margin: 2px 0 0;
            font-size: 10px;
            color: var(--neon-blue);
            font-weight: bold;
        }

        /* 3. Massive YouTube Banner */
        .youtube-section {
            padding: 20px;
            flex-shrink: 0;
        }

        .yt-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a0000;
            border: 4px solid var(--yt-red);
            border-radius: 20px;
            padding: 40px 0;
            text-decoration: none;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            transition: transform 0.2s;
        }

        .yt-btn:active { transform: scale(0.98); }

        .yt-btn i {
            font-size: 70px;
            color: var(--yt-red);
        }

        .yt-btn span {
            color: var(--yt-red);
            font-weight: bold;
            font-size: 22px;
            margin-top: 10px;
            letter-spacing: 4px;
        }

        /* 4. 3x3 App Grid */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 0 20px 20px;
            flex: 1;
        }

        .app-card {
            background: white;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }

        .app-card:active { background: #e0e0e0; }

        .app-card i {
            font-size: 30px;
            margin-bottom: 5px;
        }

        .app-card span {
            font-size: 11px;
            font-weight: 600;
        }

        /* Footer Accent Line */
        .footer-line {
            height: 3px;
            background: var(--neon-blue);
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="top-bar">MOHAMMAD SOHEL HOSSAIN</div>

    <div class="profile-container">
        <div class="user-details">
            <div class="avatar"></div>
            <div class="user-text">
                <h2>MOHAMMAD SOHEL HOSSAIN</h2>
                <p><i class="fas fa-check-circle"></i> PREMIUM USER</p>
            </div>
        </div>
        <i class="fas fa-cog" style="color: #888; font-size: 20px;"></i>
    </div>

    <div class="youtube-section">
        <a href="https://www.youtube.com" class="yt-btn">
            <i class="fab fa-youtube"></i>
            <span>YOUTUBE</span>
        </a>
    </div>

    <div class="app-grid">
        <a href="https://google.com" class="app-card">
            <i class="fab fa-google" style="color: #4285F4;"></i>
            <span>Google</span>
        </a>
        <a href="https://facebook.com" class="app-card">
            <i class="fab fa-facebook" style="color: #1877F2;"></i>
            <span>Facebook</span>
        </a>
        <a href="https://gemini.google.com" class="app-card">
            <i class="fas fa-wand-magic-sparkles" style="color: #8E75FF;"></i>
            <span>Gemini AI</span>
        </a>

        <a href="https://tiktok.com" class="app-card">
            <i class="fab fa-tiktok" style="color: #000;"></i>
            <span>TikTok</span>
        </a>
        <a href="https://web.whatsapp.com" class="app-card">
            <i class="fab fa-whatsapp" style="color: #25D366;"></i>
            <span>WhatsApp</span>
        </a>
        <a href="https://quran.com" class="app-card">
            <i class="fas fa-book-quran" style="color: #B8860B;"></i>
            <span>Al-Quran</span>
        </a>

        <a href="tel:" class="app-card">
            <i class="fas fa-phone-alt" style="color: #34C759;"></i>
            <span>Dialer</span>
        </a>
        <a href="#" class="app-card">
            <i class="fas fa-wifi" style="color: #007AFF;"></i>
            <span>WiFi Setup</span>
        </a>
        <a href="#" class="app-card">
            <i class="fas fa-battery-three-quarters" style="color: #4CAF50;"></i>
            <span>AccuBattery</span>
        </a>
    </div>

    <div class="footer-line"></div>

</body>
</html>
