<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOHAMMAD SOHEL HOSSAIN - Dashboard</title>
    <style>
        :root {
            --neon-blue: #00f2fe;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top, #1e3a8a, #0b0f19);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* হেডার */
        .header {
            width: 90%;
            display: flex;
            justify-content: space-between;
            padding: 20px 0;
            align-items: center;
        }

        /* ১. বড় ইউটিউব সেকশন (সবসময় উজ্জ্বল) */
        .youtube-container {
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ff0000; /* লাল বর্ডার */
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.5); /* সবসময় গ্লো */
            margin-bottom: 20px;
        }

        .youtube-container img {
            width: 100px;
            filter: drop-shadow(0 0 15px rgba(255, 0, 0, 1));
        }

        .youtube-text {
            color: #ff0000;
            font-weight: bold;
            margin-top: 10px;
            display: block;
            font-size: 16px;
        }

        /* অ্যাপ গ্রিড (৩ কলামে ৯টি অ্যাপ) */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 90%;
            max-width: 450px;
            padding-bottom: 30px;
        }

        /* ছোট অ্যাপ কার্ডের সাধারণ ডিজাইন */
        .app-card {
            background: var(--glass);
            border-radius: 15px;
            padding: 15px 5px;
            text-align: center;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s ease; /* স্মুথ ট্রানজিশন */
        }

        .app-card img {
            width: 40px;
            height: 40px;
            margin-bottom: 8px;
            opacity: 0.7; /* শুরুতে একটু ঝাপসা */
            transition: 0.3s ease;
        }

        span { font-size: 11px; font-weight: 500; }

        /* ********************************************* */
        /* ক্লিক করলে উজ্জ্বল হওয়ার ইফেক্ট (CSS Active) */
        /* ********************************************* */
        .app-card:active {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.6);
            color: white;
            transform: scale(0.96); /* সামান্য ছোট হবে */
        }

        .app-card:active img {
            opacity: 1; /* আইকন পুরোপুরি উজ্জ্বল হবে */
            filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.8));
        }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="45" style="border:2px solid var(--neon-blue); border-radius:50%; box-shadow: 0 0 10px var(--neon-blue);">
            <div>
                <div style="font-size:14px; font-weight:bold;">MOHAMMAD SOHEL HOSSAIN</div>
                <div style="font-size:10px; color:var(--neon-blue);">PREMIUM USER</div>
            </div>
        </div>
        <div style="font-size: 20px;">⚙️</div>
    </div>

    <a href="intent://#Intent;scheme=youtube;package=com.google.android.youtube;end" class="youtube-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" alt="YouTube">
        <span class="youtube-text">OPEN YOUTUBE APP</span>
    </a>

    <div class="grid">
        
        <a href="intent://#Intent;scheme=https;package=com.google.android.googlequicksearchbox;end" class="app-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
            <span>Google</span>
        </a>

        <a href="intent://#Intent;scheme=fb;package=com.facebook.katana;end" class="app-card">
            <img src="https://upload.wikimedia.org/wikipedia/en/0/04/Facebook_f_logo_%282021%29.svg" alt="Facebook">
            <span>Facebook</span>
        </a>

        <a href="intent://#Intent;scheme=https;package=com.google.android.apps.bard;end" class="app-card">
            <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/google-gemini-icon.png" alt="Gemini">
            <span>Gemini AI</span>
        </a>

        <a href="intent://#Intent;scheme=whatsapp;package=com.whatsapp;end" class="app-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
            <span>WhatsApp</span>
        </a>

        <a href="intent://#Intent;scheme=fb-messenger;package=com.facebook.orca;end" class="app-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/ae/Facebook_Messenger_logo_2020.svg" alt="Messenger">
            <span>Messenger</span>
        </a>

        <a href="intent://#Intent;action=android.intent.action.DIAL;end" class="app-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Google_Phone_icon.svg" alt="Phone">
            <span>Phone</span>
        </a>

        <a href="intent://#Intent;scheme=imo;package=com.imo.android.imoim;end" class="app-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Imo_logo.png" alt="Imo">
            <span>Imo</span>
        </a>

        <a href="intent://#Intent;scheme=https;package=com.quran.labs.androidquran;end" class="app-card">
            <img src="https://cdn-icons-png.flaticon.com/512/3253/3253250.png" alt="Al-Quran">
            <span>Al-Quran</span>
        </a>

        <a href="intent://#Intent;action=android.settings.WIFI_SETTINGS;end" class="app-card">
            <img src="https://cdn-icons-png.flaticon.com/512/9131/9131548.png" alt="WiFi">
            <span>WiFi Charge</span>
        </a>
    </div>

</body>
</html>
