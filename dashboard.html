<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOHAMMAD SOHEL HOSSAIN - Dashboard</title>
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-red: #ff0000;
            --glass-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: radial-gradient(circle at top, #1e3a8a, #0b0f19);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* হেডার সেকশন */
        .header {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
        }

        .user-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-box img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .user-text h2 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 1px;
        }

        /* বিশাল ইউটিউব কার্ড */
        .youtube-hero {
            width: 90%;
            max-width: 450px;
            aspect-ratio: 16/9;
            background: var(--glass-bg);
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .youtube-hero:hover {
            border-color: var(--neon-red);
            transform: scale(1.02);
        }

        .youtube-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* অ্যাপ গ্রিড */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 450px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--neon-blue);
        }

        .card img {
            width: 45px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .card span {
            display: block;
            font-size: 13px;
            font-weight: 500;
        }

        /* ফোন বাটন স্পেশাল ডিজাইন */
        .phone-card {
            border: 1px solid var(--neon-blue);
            box-shadow: inset 0 0 15px rgba(0, 242, 254, 0.2);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-box">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Profile">
            <div class="user-text">
                <h2>MOHAMMAD SOHEL HOSSAIN</h2>
                <span style="color: var(--neon-blue); font-size: 11px;">PREMIUM USER</span>
            </div>
        </div>
        <div style="font-size: 20px;">⚙️</div>
    </div>

    <a href="https://play.google.com/store/apps/details?id=com.google.android.youtube" class="youtube-hero">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" alt="YouTube" style="width: 60%; height: auto;">
    </a>

    <div class="grid-container">
        <a href="https://myaccount.google.com" class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
            <span>Google Account</span>
        </a>

        <a href="https://www.facebook.com" class="card">
            <img src="https://upload.wikimedia.org/wikipedia/en/0/04/Facebook_f_logo_%282021%29.svg" alt="Facebook">
            <span>Facebook</span>
        </a>

        <a href="https://gemini.google.com" class="card">
            <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/google-gemini-icon.png" alt="Gemini">
            <span>Gemini AI</span>
        </a>

        <a href="https://play.google.com/store/apps/details?id=com.google.android.dialer" class="card phone-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Google_Phone_icon.svg" alt="Phone">
            <span>Official Phone Call</span>
        </a>
    </div>

    <p style="margin-top: 40px; color: #555; font-size: 12px;">© 2026 MDSOHEL SHORAF HOSSAIN</p>

</body>
</html>
