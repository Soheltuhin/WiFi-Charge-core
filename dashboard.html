<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOHAMMAD SOHEL HOSSAIN - Dashboard</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #1e3a8a, #0b0f19);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* হেডার */
        .header {
            width: 90%;
            display: flex;
            justify-content: space-between;
            padding: 20px 0;
            align-items: center;
        }

        /* ইউটিউব সেকশন (উপরে) */
        .youtube-container {
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #00f2fe;
            border-radius: 20px;
            padding: 30px 10px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
            margin-bottom: 20px;
        }

        .youtube-container img {
            width: 120px;
            filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.8));
        }

        .youtube-text {
            color: #ff0000;
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }

        /* অ্যাপ গ্রিড */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 450px;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* উজ্জ্বল আইকন ইফেক্ট (ইউটিউব বাদে শুধু এগুলো উজ্জ্বল) */
        .glow img {
            width: 45px;
            height: 45px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.6));
        }

        /* ফোন বাটন (উজ্জ্বলতা ছাড়া সাধারণ ডিজাইন) */
        .phone-card img {
            width: 45px;
            height: 45px;
            margin-bottom: 10px;
        }

        span { font-size: 13px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="45" style="border:2px solid #00f2fe; border-radius:50%;">
            <div>
                <div style="font-size:14px; font-weight:bold;">MOHAMMAD SOHEL HOSSAIN</div>
                <div style="font-size:10px; color:#00f2fe;">PREMIUM USER</div>
            </div>
        </div>
        <div>⚙️</div>
    </div>

    <a href="intent://#Intent;scheme=youtube;package=com.google.android.youtube;end" class="youtube-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" alt="YouTube">
        <span class="youtube-text">OPEN YOUTUBE APP</span>
    </a>

    <div class="grid">
        <a href="intent://#Intent;scheme=https;package=com.google.android.googlequicksearchbox;end" class="app-card glow">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
            <span>Google Account</span>
        </a>

        <a href="intent://#Intent;scheme=fb;package=com.facebook.katana;end" class="app-card glow">
            <img src="https://upload.wikimedia.org/wikipedia/en/0/04/Facebook_f_logo_%282021%29.svg" alt="Facebook">
            <span>Facebook</span>
        </a>

        <a href="intent://#Intent;scheme=https;package=com.google.android.apps.bard;end" class="app-card glow">
            <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/google-gemini-icon.png" alt="Gemini">
            <span>Gemini AI</span>
        </a>

        <a href="intent://#Intent;action=android.intent.action.DIAL;end" class="app-card phone-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Google_Phone_icon.svg" alt="Phone">
            <span>Phone</span>
        </a>
    </div>

</body>
</html>
