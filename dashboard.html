<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi-Charge Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --gold: #D4AF37;
            --emergency-red: #FF0000;
            --border-color: #eeeeee;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header / Real Time Clock */
        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        #clock {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* Dashboard Container */
        .container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* Status Cards */
        .status-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .card i {
            font-size: 1.5rem;
            margin-bottom: 10px;
            display: block;
        }

        /* Golden Fingerprint Icon */
        .admin-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .fingerprint-icon {
            font-size: 50px;
            color: var(--gold);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .fingerprint-icon:hover {
            transform: scale(1.1);
        }

        /* Emergency Button */
        .sos-container {
            text-align: center;
            margin-top: 30px;
        }

        .sos-btn {
            background-color: var(--emergency-red);
            color: white;
            border: none;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        /* Bottom Navigation (WhatsApp Style) */
        nav {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-top: 1px solid var(--border-color);
            background: white;
        }

        nav i {
            font-size: 1.5rem;
            color: #555;
            cursor: pointer;
        }

        nav i:hover {
            color: var(--text-color);
        }

    </style>
</head>
<body>

    <header>
        <div id="clock">12:00:00</div>
        <small>Real Time Status</small>
    </header>

    <div class="container">
        
        <div class="admin-section">
            <i class="fa-solid fa-fingerprint fingerprint-icon"></i>
            <p><strong>গ্রুপ এডমিন</strong></p>
        </div>

        <div class="status-row">
            <div class="card">
                <i class="fa-solid fa-wifi" style="color: #007AFF;"></i>
                <span>ডাটা ওয়ালেট</span>
                <div style="font-weight:bold; margin-top:5px;">৮৫% চার্জড</div>
            </div>
            <div class="card">
                <i class="fa-solid fa-phone" style="color: #28a745;"></i>
                <span>অডিও কলিং</span>
                <div style="font-size: 12px; color: gray;">শুধুমাত্র ভয়েস</div>
            </div>
        </div>

        <div class="sos-container">
            <button class="sos-btn" onclick="triggerSOS()">SOS<br>বিপদ সংকেত</button>
            <p style="margin-top:15px; font-size: 14px; color: #555;">এক চাপে মেসেজ, দ্বিতীয় চাপে লোকেশন</p>
        </div>

    </div>

    <nav>
        <i class="fa-solid fa-comment"></i>
        <i class="fa-solid fa-users"></i>
        <i class="fa-solid fa-circle-notch"></i>
        <i class="fa-solid fa-gear"></i>
    </nav>

    <script>
        // রিয়েল টাইম ক্লক ফাংশন
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM': 'AM';
            
            hours = hours % 12;
            hours = hours? hours : 12; // 0 কে 12 করা
            const strTime = hours + ':' + minutes + ':' + seconds + ' ' + ampm;
            
            document.getElementById('clock').textContent = strTime;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // SOS ফাংশনালিটি সিমুলেশন
        let sosCount = 0;
        function triggerSOS() {
            sosCount++;
            if(sosCount === 1) {
                alert("প্রথম ধাপ: পরিবারের গ্রুপে 'আমি বিপদে আছি' মেসেজ পাঠানো হয়েছে।");
            } else if(sosCount === 2) {
                alert("দ্বিতীয় ধাপ: আপনার লাইভ লোকেশন এবং ভয়েস স্ন্যাপশট শেয়ার করা হচ্ছে!");
                sosCount = 0; // রিসেট
            }
        }
    </script>
</body>
</html>
