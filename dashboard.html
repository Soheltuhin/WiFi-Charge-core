<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --bg-sky: #87CEEB;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-sky);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Profile Section (Google Account Manager Style) */
        .header {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            cursor: pointer;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .user-text h2 {
            margin: 0;
            font-size: 16px;
            color: white;
            text-transform: uppercase;
        }

        .user-text p {
            margin: 0;
            font-size: 12px;
            color: var(--neon-blue);
            font-weight: bold;
        }

        /* YouTube Big Button */
        .yt-container {
            width: 90%;
            margin: 30px 0;
            background: #003366;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        .yt-btn {
            font-size: 80px;
            color: red;
            text-decoration: none;
            display: block;
        }

        .yt-text {
            color: red;
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }

        /* 9 Apps Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 90%;
            padding-bottom: 50px;
        }

        .app-card {
            background: #001a33;
            border-radius: 15px;
            padding: 15px 5px;
            text-align: center;
            color: white;
            text-decoration: none;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .app-card:active {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .app-card i {
            font-size: 30px;
            margin-bottom: 8px;
            display: block;
        }

        .app-card span {
            font-size: 10px;
            display: block;
        }

        /* Account Manager Modal */
        #accountModal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            background: white;
            border-radius: 20px;
            padding: 20px;
            z-index: 1000;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .close-btn {
            background: #eee;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header" onclick="toggleModal()">
        <div class="user-info">
            <img src="https://via.placeholder.com/50" alt="User" class="avatar">
            <div class="user-text">
                <h2 id="userName">MOHAMMAD SOHEL HOSSAIN</h2>
                <p>PREMIUM USER</p>
            </div>
        </div>
        <i class="fas fa-cog" style="color: #ccc; font-size: 20px;"></i>
    </div>

    <div class="yt-container">
        <a href="vnd.youtube://" class="yt-btn">
            <i class="fab fa-youtube"></i>
        </a>
        <span class="yt-text">OPEN YOUTUBE APP</span>
    </div>

    <div class="grid-container">
        <a href="https://google.com" class="app-card">
            <i class="fab fa-google" style="color: #4285F4;"></i>
            <span>Google Account</span>
        </a>
        <a href="fb://facewebmodal/f?href=https://facebook.com" class="app-card">
            <i class="fab fa-facebook" style="color: #1877F2;"></i>
            <span>Facebook</span>
        </a>
        <a href="https://gemini.google.com" class="app-card">
            <i class="fas fa-sparkles" style="color: #8E75FF;"></i>
            <span>Gemini AI</span>
        </a>
        <a href="whatsapp://send?phone=" class="app-card">
            <i class="fab fa-whatsapp" style="color: #25D366;"></i>
            <span>WhatsApp Business</span>
        </a>
        <a href="fb-messenger://user/" class="app-card">
            <i class="fab fa-facebook-messenger" style="color: #006AFF;"></i>
            <span>Messenger</span>
        </a>
        <a href="tel:" class="app-card">
            <i class="fas fa-phone-alt" style="color: #34C759;"></i>
            <span>Phone</span>
        </a>
        <a href="https://imo.im/" class="app-card">
            <i class="fas fa-comment-dots" style="color: #2196F3;"></i>
            <span>IMO</span>
        </a>
        <a href="https://quran.com" class="app-card">
            <i class="fas fa-kaaba" style="color: #FFD700;"></i>
            <span>Al-Quran</span>
        </a>
        <a href="https://play.google.com/store/apps/details?id=com.digibites.accubattery" class="app-card">
            <i class="fas fa-wifi" style="color: #4CAF50;"></i>
            <span>WiFi Charge</span>
        </a>
    </div>

    <div id="accountModal">
        <img src="https://via.placeholder.com/80" alt="User" style="border-radius: 50%;">
        <h3>Manage Your Account</h3>
        <p><strong>Name:</strong> Mohammad Sohel Hossain</p>
        <p><strong>Status:</strong> Premium Member</p>
        <p><strong>Email:</strong> sohel@example.com</p>
        <hr>
        <button class="close-btn" onclick="toggleModal()">Close</button>
    </div>

    <script>
        function toggleModal() {
            var modal = document.getElementById('accountModal');
            if (modal.style.display === "block") {
                modal. style.display = "none";
            } else {
                modal. style.display = "block";
            }
        }
    </script>

</body>
</html>
